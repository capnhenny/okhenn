<footer class="site-footer" id="footer">
  <div class="footer-inner">

    <!-- Row 0: Hit counter -->
    <span class="hit-counter">
      YOU ARE VISITOR # <span id="visits">...</span>
    </span>
    <div class="visit-sparkline" id="visitSparkline" aria-hidden="true"></div>

    <!-- Row 1: site nav chips -->
    <nav class="footer-row footer-nav" aria-label="footer navigation">
      <a class="footer-chip" href="{{ '/' | relative_url }}">home</a>
      <a class="footer-chip" href="{{ '/journal/' | relative_url }}">journal</a>
      <a class="footer-chip" href="{{ '/adventures/' | relative_url }}">adventures</a>
      <a class="footer-chip" href="{{ '/cooking/' | relative_url }}">cooking</a>
      <a class="footer-chip" href="{{ '/about/' | relative_url }}">about</a>
      <a class="footer-chip" href="{{ '/contact/' | relative_url }}">contact</a>
    </nav>

    <!-- Row 2: social icons -->
    <nav class="footer-row footer-social" aria-label="social links">
      <a class="social-icon" href="https://instagram.com/hennyonthechop" target="_blank" rel="noopener" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a class="social-icon" href="https://github.com/capnhenny" target="_blank" rel="noopener" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a class="social-icon" href="https://www.tiktok.com/@hennyonthechop" target="_blank" rel="noopener" aria-label="TikTok">
        <i class="fa-brands fa-tiktok"></i>
      </a>
    </nav>

    <!-- Row 3: copyright -->
    <div class="footer-row copyright">
      © {{ site.time | date: "%Y" }} ok
      {% if page.url == '/adventures/' %}
        <a href="https://henn-cockpit.vercel.app" class="secret-cockpit-link">
          henn <span class="secret-sparkle">✨</span>
        </a>
      {% else %}
        henn
      {% endif %}
    </div>

  </div>
</footer>

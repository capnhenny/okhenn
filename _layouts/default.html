<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <link rel="stylesheet" href="/styles.css?v={{ site.time | date: '%s' }}">
  {% include favicon.html %}
</head>
<body class="{{ page.body_class }}">

  <div class="henn-march" aria-hidden="true">
    <div class="henn-march-track" id="hennMarchTrack"></div>
  </div>

  {% include header.html %}

  <main class="wrap">
    {{ content }}
  </main>

  {% include footer.html %}

  <script defer src="/assets/js/visitor-counter.js?v=2"></script>
  <script defer src="/assets/js/henn-march.js"></script>
</body>
</html>
